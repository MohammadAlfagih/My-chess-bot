
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess_backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess_frontend
    ports:
      - "3000:80" 
    depends_on:
      - backend
    restart: always